<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      height: 200px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      font-size: 24px;
      color: white;
      font-weight: bold;
      border-radius: 12px;
    }
    .content {
      text-align: center;
      padding: 20px;
    }
    .heart {
      color: #ff6b6b;
      font-size: 32px;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="heart">❤️</div>
    <div>TEST OVERLAY</div>
    <div style="font-size: 14px; font-weight: normal; margin-top: 8px;">Stream with us!</div>
  </div>
</body>
</html>
