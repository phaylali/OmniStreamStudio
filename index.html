<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniStream Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app" class="studio-layout">
      <!-- Title Bar -->
      <header class="title-bar" data-tauri-drag-region>
        <div class="brand">
          <span class="icon">🎬</span>
          <span class="title">OmniStream Studio <span class="v2">V2</span></span>
        </div>
        <div class="window-controls">
          <button class="minimize" id="minimize-btn">─</button>
          <button class="close" id="close-btn">×</button>
        </div>
      </header>

      <div class="studio-container">
        <!-- Left: Chat Panel -->
        <aside class="sidebar-left" id="chat-sidebar">
          <div class="panel-header">
            <span>MULTISTREAM CHAT</span>
            <button class="panel-toggle" id="toggle-chat">«</button>
          </div>
          <div class="chat-placeholder">
            <div class="icon">💬</div>
            <p>Chat Integration Coming Soon</p>
          </div>
        </aside>

        <!-- Center: Preview Canvas -->
        <section class="canvas-main">
          <div class="preview-header">
            <div class="preview-badges">
              <span class="badge" id="preview-status">PREVIEW OFF</span>
              <span class="badge live-badge hidden" id="live-indicator">LIVE</span>
            </div>
            <div class="preview-controls">
              <button id="toggle-preview" class="btn-icon" title="Toggle Preview (Save Resources)">👁️</button>
              <button id="fullscreen-preview" class="btn-icon" title="Fullscreen Preview">⛶</button>
            </div>
          </div>
          <div class="preview-container">
            <canvas id="preview-canvas"></canvas>
            <div id="preview-overlay" class="preview-overlay">
                <div class="overlay-msg">Preview Disabled (Low Resource Mode)</div>
            </div>
          </div>
          <div class="canvas-footer">
             <div class="status-row">
                <div class="platform-status" id="twitch-status">
                   <span class="dot"></span> Twitch: <span class="text">Checking...</span>
                </div>
                <div class="platform-status" id="kick-status">
                   <span class="dot"></span> Kick: <span class="text">Checking...</span>
                </div>
             </div>
             <div class="timer" id="timer">00:00:00</div>
          </div>
        </section>

        <!-- Right: Controls Sidebar -->
        <aside class="sidebar-right">
          <div class="panel-header">
            <span>STUDIO CONTROLS</span>
          </div>
          
          <div class="scroll-content">
            <!-- Platform Toggle -->
            <div class="section">
              <label class="section-label">Platforms</label>
              <div class="platforms-grid">
                <button class="platform-btn" id="toggle-twitch" data-platform="twitch">
                  <span class="icon">🟣</span> Twitch
                </button>
                <button class="platform-btn" id="toggle-kick" data-platform="kick">
                  <span class="icon">🟢</span> Kick
                </button>
              </div>
            </div>

            <div id="twitch-ingest-group" class="section hidden">
              <label class="section-label">Twitch Ingest</label>
              <select id="ingest"></select>
            </div>

            <!-- Video Section -->
            <div class="section">
              <label class="section-label">Video Source</label>
              <div class="form-group">
                 <select id="monitor"></select>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label>Quality</label>
                  <select id="quality">
                    <option value="720p30">720p 30</option>
                    <option value="1080p30" selected>1080p 30</option>
                    <option value="1080p60">1080p 60</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Encoder</label>
                  <select id="encoder">
                    <option value="auto">Auto</option>
                    <option value="gpu">GPU</option>
                    <option value="cpu">CPU</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Camera Section -->
            <div class="section">
              <label class="section-label">Camera Overlay</label>
              <select id="camera-device">
                <option value="none">Disabled</option>
              </select>
              <div id="camera-settings" class="hidden">
                 <div class="form-row">
                    <div class="form-group">
                       <label>Position</label>
                       <select id="camera-pos">
                          <option value="top-left">Top Left</option>
                          <option value="top-right">Top Right</option>
                          <option value="bottom-left">Bottom Left</option>
                          <option value="bottom-right" selected>Bottom Right</option>
                       </select>
                    </div>
                    <div class="form-group">
                       <label>Size</label>
                       <select id="camera-size">
                          <option value="0.15">Small</option>
                          <option value="0.25" selected>Medium</option>
                          <option value="0.35">Large</option>
                       </select>
                    </div>
                 </div>
              </div>
            </div>

            <!-- Audio Section -->
            <div class="section">
              <label class="section-label">Audio Devices</label>
              <div class="form-group">
                <label>Input (Mic)</label>
                <select id="audio-input"></select>
                <input type="range" id="volume-input" min="0" max="150" value="100">
              </div>
              <div class="form-group">
                <label>Output (System)</label>
                <select id="audio-output"></select>
                <input type="range" id="volume-output" min="0" max="150" value="100">
              </div>
            </div>

            <div class="section">
               <button class="action-btn" id="action-btn">GO LIVE</button>
               <button class="stop-btn" id="stop-btn">FORCE STOP</button>
            </div>
          </div>

          <div class="sidebar-footer">
             <div class="status-bar">
                <span class="status-indicator" id="status-indicator"></span>
                <span id="status-text">Ready</span>
             </div>
          </div>
        </aside>
      </div>
    </div>
  </body>
</html>
