<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniStream Studio</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app" class="studio-layout">
      <!-- Title Bar -->
      <header class="title-bar" data-tauri-drag-region>
        <div class="brand">
          <span class="icon">🎬</span>
          <span class="title">OmniStream Studio <span class="v2">V2</span></span>
        </div>
        <div class="window-controls">
          <button class="minimize" id="minimize-btn">─</button>
          <button class="close" id="close-btn">×</button>
        </div>
      </header>

      <div class="studio-container">
        <!-- Left: Layers Panel -->
        <aside class="sidebar-left" id="layers-sidebar">
          <div class="panel-header">
            <span>SCENE LAYERS</span>
            <button class="add-layer-btn" id="add-layer-btn">+</button>
          </div>
          <div class="layers-list" id="layers-list">
            <!-- Dynamically populated -->
          </div>
          <div class="add-layer-menu hidden" id="add-layer-menu">
            <button data-type="monitor">Monitor</button>
            <button data-type="camera">Camera</button>
            <button data-type="image">Image</button>
            <button data-type="video">Video</button>
            <button data-type="mic">Mic Input</button>
            <button data-type="music">Music / Audio File</button>
            <button data-type="placeholder">Placeholder</button>
          </div>
        </aside>

        <!-- Center: Preview Canvas -->
        <section class="canvas-main">
          <div class="preview-header">
            <div class="preview-badges">
              <span class="badge" id="preview-status">PREVIEW OFF</span>
              <span class="badge live-badge hidden" id="live-indicator">LIVE</span>
            </div>
            <!-- Usage Stats Overlay -->
            <div class="usage-stats" id="usage-stats">
              <span class="stat">CPU: <span id="stat-cpu">0.0</span>%</span>
              <span class="stat">GPU: <span id="stat-gpu">0</span>%</span>
              <span class="stat">VRAM: <span id="stat-vram">0</span>MB</span>
            </div>
            <div class="preview-controls">
              <button id="toggle-preview" class="btn-icon" title="Toggle Preview">👁️</button>
              <button id="fullscreen-preview" class="btn-icon" title="Fullscreen Preview">⛶</button>
            </div>
          </div>
          <div class="preview-container">
            <canvas id="preview-canvas"></canvas>
            <div id="preview-overlay" class="preview-overlay">
                <div class="overlay-msg">Preview Disabled</div>
            </div>
          </div>
          <div class="canvas-footer">
             <div class="status-row">
                <div class="platform-status" id="twitch-status">
                   <span class="dot"></span> Twitch: <span class="text">OFFLINE</span>
                </div>
                <div class="platform-status" id="kick-status">
                   <span class="dot"></span> Kick: <span class="text">OFFLINE</span>
                </div>
             </div>
             <div class="timer" id="timer">00:00:00</div>
          </div>
        </section>

        <!-- Right: Controls Sidebar -->
        <aside class="sidebar-right">
          <div class="panel-header">
            <span>STREAM SETTINGS</span>
          </div>
          
          <div class="scroll-content">
            <!-- Platform Toggle -->
            <div class="section">
              <label class="section-label">Platforms</label>
              <div class="platforms-grid">
                <button class="platform-btn" id="toggle-twitch" data-platform="twitch">
                  <span class="icon">🟣</span> Twitch
                </button>
                <button class="platform-btn" id="toggle-kick" data-platform="kick">
                  <span class="icon">🟢</span> Kick
                </button>
              </div>
            </div>

            <div id="twitch-ingest-group" class="section hidden">
              <label class="section-label">Twitch Ingest</label>
              <select id="ingest"></select>
            </div>

            <!-- Video Section -->
            <div class="section">
              <label class="section-label">Output Quality</label>
              <div class="form-row">
                <div class="form-group">
                  <label>Resolution/FPS</label>
                  <select id="quality">
                    <option value="720p30">720p 30</option>
                    <option value="1080p30" selected>1080p 30</option>
                    <option value="1080p60">1080p 60</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Encoder</label>
                  <select id="encoder">
                    <option value="detecting">Detecting hardware...</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="section">
               <button class="action-btn" id="action-btn">GO LIVE</button>
               <button class="stop-btn" id="stop-btn">FORCE STOP</button>
               <button class="action-btn" id="test-webrtc-btn" style="margin-top:10px; background:#4CAF50">Test WebRTC Capture</button>
            </div>
          </div>

          <div class="sidebar-footer">
             <div class="status-bar">
                <span class="status-indicator" id="status-indicator"></span>
                <span id="status-text">Ready</span>
             </div>
          </div>
        </aside>
      </div>
    </div>
  </body>
</html>
