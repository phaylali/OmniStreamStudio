<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniStream Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Montserrat:wght@700&family=Oswald:wght@700&family=Pacifico&family=Roboto:wght@700&display=swap" rel="stylesheet">
    <style>
      #konva-container {
        width: 100%;
        height: 100%;
        background: #000;
      }
      #konva-container canvas {
        display: block;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-B5rE1rrq.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CAVNMK7x.css">
  </head>

  <body>
    <div id="app" class="studio-layout">
      <!-- Title Bar -->
      <header class="title-bar" data-tauri-drag-region>
        <div class="brand">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 2 1.5-1.5a2 2 0 0 1 2.83 0L12 3l1.17.17a2 2 0 0 0 1.66 0l.68.68a2 2 0 0 1 0 2.98L17 9.5v5l-1 1-1-1v-4.32L11.17 8.5a2 2 0 0 0-1.66 0l-.68.68a2 2 0 0 1-2.98 0L5 10.84V19l-1.5 1.5z"/><path d="m9 14 3 3 3-3"/><path d="M5 19 8 16 5 13"/><path d="M19 5 22 8 19 11"/><circle cx="17" cy="17" r="3"/></svg>
          <span class="title">OmniStream Studio <span class="v2">V2</span></span>
        </div>
        <div class="toolbar">
          <button class="toolbar-btn" id="undo-btn" title="Undo (Ctrl+Z)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
          </button>
          <button class="toolbar-btn" id="redo-btn" title="Redo (Ctrl+Y)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>
          </button>
          <button class="toolbar-btn danger" id="delete-btn" title="Delete (Del)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          </button>
        </div>
        <div class="window-controls">
          <button class="minimize" id="minimize-btn" title="Minimize">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
          </button>
          <button class="maximize" id="maximize-btn" title="Maximize">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
          </button>
          <button class="close" id="close-btn" title="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
          </button>
        </div>
      </header>

      <!-- Main Content Area -->
      <div class="studio-container">
        <!-- Left: Layers Panel (Fixed Width) -->
        <aside class="sidebar-left" id="layers-sidebar">
          <div class="panel-header" id="scenes-header" style="display: flex; justify-content: space-between; align-items: center;">
            <span>SCENES</span>
            <button class="add-scene-btn" id="add-scene-btn" title="Add Scene">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
          </div>
          <div class="scenes-list" id="scenes-list">
            <!-- Dynamically populated -->
          </div>
          <div class="panel-header">
            <span>LAYERS</span>
            <button class="add-layer-btn" id="add-layer-btn" title="Add Layer">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            </button>
          </div>
          <div class="layers-list" id="layers-list">
            <!-- Dynamically populated -->
          </div>
        </aside>

        <!-- Add Layer Dialog -->
        <div class="dialog-overlay hidden" id="add-layer-dialog">
          <div class="dialog">
            <div class="dialog-header">
              <span>Add Layer</span>
              <button class="dialog-close" id="dialog-close">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
              </button>
            </div>
            <div class="dialog-tabs">
              <button class="dialog-tab active" data-type="image">Image</button>
              <button class="dialog-tab" data-type="html">HTML</button>
              <button class="dialog-tab" data-type="text">Text</button>
              <button class="dialog-tab" data-type="widget">Widgets</button>
              <button class="dialog-tab" data-type="media">Media</button>
              <button class="dialog-tab" data-type="audio">Audio</button>
            </div>
            <div class="dialog-content">
              <!-- Image tab -->
              <div class="dialog-panel active" data-panel="image">
                <input type="file" id="image-file-input" accept="image/*" class="hidden">
                <button class="dialog-action" id="select-image-btn">Select Image File</button>
                <div class="url-divider">
                  <span>or enter URL</span>
                </div>
                <div class="form-group">
                  <input type="text" id="url-input" placeholder="https://example.com/image.png">
                </div>
                <button class="dialog-action primary" id="load-url-btn">Load URL</button>
              </div>
              <!-- HTML tab -->
              <div class="dialog-panel" data-panel="html">
                <input type="file" id="html-file-input" accept=".html,.htm" class="hidden">
                <button class="dialog-action" id="select-html-btn">Select HTML File</button>
                <div class="url-divider">
                  <span>or enter URL</span>
                </div>
                <div class="form-group">
                  <input type="text" id="html-url-input" placeholder="https://example.com/widget">
                </div>
                <button class="dialog-action primary" id="load-html-btn">Load HTML</button>
              </div>
              <!-- Text tab -->
              <div class="dialog-panel" data-panel="text">
                <div class="form-group">
                  <label>Text</label>
                  <input type="text" id="text-input" placeholder="Hello World">
                </div>
                <div class="form-group">
                  <label>Font Size</label>
                  <select id="text-font-size">
                    <option value="24">24px</option>
                    <option value="36" selected>36px</option>
                    <option value="48">48px</option>
                    <option value="60">60px</option>
                    <option value="72">72px</option>
                    <option value="96">96px</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Color</label>
                  <input type="color" id="text-color" value="#ffffff">
                </div>
                <button class="dialog-action primary" id="add-text-btn">Add Text</button>
              </div>
              <!-- Widget tab -->
              <div class="dialog-panel" data-panel="widget">
                <div class="form-group">
                  <label>Widget Type</label>
                  <select id="widget-type-select">
                    <option value="clock">Digital Clock</option>
                    <option value="countdown">Countdown Timer</option>
                    <option value="twitch-viewers">Twitch Viewers Count</option>
                    <option value="kick-viewers">Kick Viewers Count</option>
                    <option value="alerts">Event Alerts (Follow/Sub)</option>
                  </select>
                </div>
                <div class="form-group" id="widget-config-group" style="display:none;">
                  <label id="widget-config-label">Minutes</label>
                  <input type="number" id="widget-config-input" value="5">
                </div>
                <div class="form-group">
                  <label>Font Family</label>
                  <select id="widget-font">
                    <option value="Inter">Inter</option>
                    <option value="Roboto">Roboto</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Oswald">Oswald</option>
                    <option value="Pacifico">Pacifico</option>
                  </select>
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label>Text Color</label>
                    <input type="color" id="widget-color" value="#00fa9a">
                  </div>
                  <div class="form-group">
                    <label>Background</label>
                    <input type="color" id="widget-bg-color" value="#1a1a1c">
                  </div>
                </div>
                <div class="form-group">
                  <label>Background Shape</label>
                  <select id="widget-bg-shape">
                    <option value="none">None (Transparent)</option>
                    <option value="pill" selected>Pill (Rounded)</option>
                    <option value="rect">Rectangle</option>
                  </select>
                </div>
                <button class="dialog-action primary" id="add-widget-btn">Add Widget</button>
              </div>
              <!-- Media tab -->
              <div class="dialog-panel" data-panel="media">
                <div class="form-group">
                  <label>Select Video or Audio File</label>
                  <input type="file" id="media-file-input" accept="video/*,audio/*,.mp4,.webm,.mp3,.wav" class="hidden">
                  <button class="dialog-action" id="select-media-btn" style="width: 100%;">Select File</button>
                </div>
                <div class="form-group">
                  <label>Preview</label>
                  <div id="media-preview" style="padding: 10px; background: var(--bg-input); border-radius: 4px; color: var(--text-secondary); font-size: 12px;">
                    No file selected
                  </div>
                  <input type="hidden" id="media-src-input" value="">
                </div>
                <button class="dialog-action primary" id="add-media-btn">Add to Canvas</button>
              </div>
              <!-- Audio tab -->
              <div class="dialog-panel" data-panel="audio">
                <div class="form-group">
                  <label>Microphone</label>
                  <select id="audio-input-device">
                    <option value="">None</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Desktop Audio</label>
                  <button class="dialog-action" id="capture-desktop-audio-btn" style="width: 100%;">
                    Select Desktop to Capture
                  </button>
                </div>
                <div class="form-group">
                  <label>Status</label>
                  <div id="audio-preview" style="padding: 10px; background: var(--bg-input); border-radius: 4px; color: var(--text-secondary); font-size: 12px;">
                    No audio selected
                  </div>
                </div>
                <button class="dialog-action primary" id="add-audio-btn">Apply Audio Settings</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Center: Canvas Area (Flexible) -->
        <section class="canvas-main">
          <div class="canvas-wrapper" id="canvas-wrapper">
            <div class="preview-container" id="konva-container">
              <!-- Konva canvas will be rendered here -->
            </div>
          </div>
        </section>

        <!-- Right: Chat Placeholder (Fixed Width) -->
        <aside class="sidebar-right chat-sidebar" id="chat-sidebar">
          <div class="panel-header">
            <span>CHAT</span>
          </div>
          <div class="chat-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Chat coming soon</p>
          </div>
        </aside>
      </div>

      <!-- Bottom Bar: Stream Controls -->
      <footer class="bottom-bar">
        <div class="stream-controls">
          <div class="platform-toggles">
            <button class="platform-toggle active" id="toggle-twitch" data-platform="twitch">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714Z"/></svg>
              <span>Twitch</span>
            </button>
            <button class="platform-toggle" id="toggle-kick" data-platform="kick">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.5 7.5l-3 3-3-3V4l3-3 3 3v3.5zm-3 6l3-3 3 3v-3l-3 3-3-3v3z"/></svg>
              <span>Kick</span>
            </button>
          </div>
          
          <div class="ingest-select">
            <select id="ingest">
              <option value="">Select Ingest</option>
              <option value="sjc">San Jose</option>
              <option value="lax">Los Angeles</option>
              <option value="den">Denver</option>
              <option value="atl">Atlanta</option>
              <option value="nyc">New York</option>
              <option value="chi">Chicago</option>
            </select>
          </div>
          
          <div class="quality-select">
            <select id="quality">
              <option value="720p30">720p 30fps</option>
              <option value="1080p30" selected>1080p 30fps</option>
              <option value="1080p60">1080p 60fps</option>
            </select>
          </div>
          
          <div class="stream-buttons">
            <button class="action-btn" id="action-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              GO LIVE
            </button>
            <button class="stop-btn" id="stop-btn" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
              STOP
            </button>
            <button class="force-stop-btn" id="force-stop-btn" title="Force Stop All">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        
        <div class="status-bar">
          <span class="status-indicator" id="status-indicator"></span>
          <span id="status-text">Ready</span>
          <span class="timer" id="timer">00:00:00</span>
        </div>
      </footer>
    </div>
  </body>
</html>
